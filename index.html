
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Govinda Chauhan | AI Systems Founder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Great+Vibes&family=Italianno&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              signature: ['Italianno', 'cursive'],
              pixel: ['Pixelify Sans', 'monospace'],
            },
            colors: {
              background: 'var(--background)',
              foreground: 'var(--foreground)',
              cherry: '#ff3333',
              acid: '#ccff00',
            },
            letterSpacing: {
              tighter: '-0.05em',
              tight: '-0.025em',
            },
            boxShadow: {
              'brutal': '5px 5px 0px 0px rgba(0,0,0,1)',
              'brutal-white': '5px 5px 0px 0px rgba(255,255,255,1)',
              'brutal-acid': '5px 5px 0px 0px #ccff00',
              'brutal-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
              'brutal-hover-white': '2px 2px 0px 0px rgba(255,255,255,1)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --background: #fcfcfd;
        --foreground: #09090b;
        --card-bg: rgba(255, 255, 255, 0.7);
        --card-border: rgba(9, 9, 11, 0.05);
        --glow-color: rgba(99, 102, 241, 0.15);
      }
      .dark {
        --background: #030303;
        --foreground: #fafafa;
        --card-bg: rgba(9, 9, 11, 0.6);
        --card-border: rgba(255, 255, 255, 0.08);
        --glow-color: rgba(139, 92, 246, 0.25);
      }
      
      body {
        background-color: var(--background);
        color: var(--foreground);
        position: relative;
        transition: background-color 0.5s cubic-bezier(0.16, 1, 0.3, 1), color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        overflow-x: hidden;
      }

      /* Noise Texture Overlay for Premium Organic Feel */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.015;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .premium-glow {
        box-shadow: 0 0 40px 10px var(--glow-color);
      }
      
      /* Glass Card */
      .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .glass-card:hover {
        border-color: rgba(99, 102, 241, 0.3);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
        transform: translateY(-4px);
      }

      .dark .glass-card:hover {
        border-color: rgba(139, 92, 246, 0.4);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.15);
        border-radius: 999px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.2);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.3);
      }
      
      ::selection {
        background: rgba(99, 102, 241, 0.25);
        color: inherit;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^0.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
